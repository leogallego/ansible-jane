version: 2

updates:
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      kotlin:
        patterns:
          - "org.jetbrains.kotlin*"
          - "org.jetbrains.kotlinx:kotlinx-coroutines*"
          - "org.jetbrains.kotlinx:kotlinx-serialization*"
          - "org.jetbrains.kotlinx:kotlinx-collections*"
          - "org.jetbrains.kotlinx:kotlinx-datetime*"
      compose-multiplatform:
        patterns:
          - "org.jetbrains.compose*"
          - "org.jetbrains.androidx.lifecycle*"
          - "org.jetbrains.androidx.navigation*"
      compose-android:
        patterns:
          - "androidx.compose*"
          - "androidx.activity:activity-compose"
      lifecycle:
        patterns:
          - "androidx.lifecycle*"
      koin:
        patterns:
          - "io.insert-koin*"
      ktor:
        patterns:
          - "io.ktor*"
      koog:
        patterns:
          - "ai.koog*"
      mcp:
        patterns:
          - "io.modelcontextprotocol*"
      security:
        patterns:
          - "dev.whyoleg.cryptography*"
          - "com.google.crypto.tink*"
      datastore:
        patterns:
          - "androidx.datastore*"
      navigation:
        patterns:
          - "androidx.navigation*"
      markdown:
        patterns:
          - "com.mikepenz*"
      testing:
        patterns:
          - "junit*"
          - "org.robolectric*"
          - "app.cash.turbine*"
          - "androidx.test*"
          - "com.squareup.okhttp3*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
