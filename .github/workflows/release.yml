name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.8.4-alpha.7)'
        required: true
        type: string
      build_all:
        description: 'Build all platforms (macOS, Windows, Flatpak) even for pre-release tags'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  apk:
    name: Build signed APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: refs/tags/${{ env.RELEASE_TAG }}

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: jetbrains
          java-version: "25"
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Set execution flag for gradlew
        run: chmod +x gradlew

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_B64 }}" | base64 --decode > /tmp/release.jks

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Run shared JVM tests
        run: ./gradlew :shared:jvmTest --stacktrace

      - name: Build release APK
        run: ./gradlew assembleRelease --stacktrace
        env:
          KEYSTORE_FILE: /tmp/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Rename APK
        run: |
          VERSION="${RELEASE_TAG#v}"
          mv app/build/outputs/apk/release/app-release.apk "ansible-jane-${VERSION}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: apk
          path: ansible-jane-*.apk

  desktop-linux-deb:
    name: Build Desktop DEB + JAR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: refs/tags/${{ env.RELEASE_TAG }}

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: jetbrains
          java-version: "25"
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set execution flag for gradlew
        run: chmod +x gradlew

      - name: Run Desktop UI tests
        run: ./gradlew :composeApp:desktopTest --stacktrace

      - name: Build Desktop uber JAR
        run: ./gradlew :composeApp:packageUberJarForCurrentOS --stacktrace

      - name: Build application distribution
        run: ./gradlew :composeApp:createDistributable --stacktrace

      - name: Copy java binary into runtime
        run: |
          DIST_DIR="composeApp/build/compose/binaries/main/app/ansible-jane"
          mkdir -p "$DIST_DIR/lib/runtime/bin"
          cp "$JAVA_HOME/bin/java" "$DIST_DIR/lib/runtime/bin/java"
          chmod +x "$DIST_DIR/lib/runtime/bin/java"

      - name: Replace native launcher with shell script
        run: |
          VERSION="${RELEASE_TAG#v}"
          DIST_DIR="composeApp/build/compose/binaries/main/app/ansible-jane"
          cp composeApp/packaging/launcher.sh "$DIST_DIR/bin/ansible-jane"
          sed -i "s/@VERSION@/$VERSION/" "$DIST_DIR/bin/ansible-jane"
          chmod +x "$DIST_DIR/bin/ansible-jane"

      - name: Install fpm
        run: sudo apt-get update && sudo apt-get install -y ruby-dev desktop-file-utils && sudo gem install fpm

      - name: Validate desktop file
        run: desktop-file-validate composeApp/packaging/ansible-jane.desktop

      - name: Build DEB package
        run: |
          VERSION="${RELEASE_TAG#v}"
          DIST_DIR="composeApp/build/compose/binaries/main/app/ansible-jane"
          PKG_ROOT=$(mktemp -d)

          mkdir -p "$PKG_ROOT/opt/ansible-jane"
          cp -r "$DIST_DIR/." "$PKG_ROOT/opt/ansible-jane/"

          mkdir -p "$PKG_ROOT/usr/share/applications"
          cp composeApp/packaging/ansible-jane.desktop "$PKG_ROOT/usr/share/applications/"

          mkdir -p "$PKG_ROOT/usr/share/icons/hicolor/512x512/apps"
          cp composeApp/icon.png "$PKG_ROOT/usr/share/icons/hicolor/512x512/apps/ansible-jane.png"

          mkdir -p "$PKG_ROOT/usr/bin"
          ln -s /opt/ansible-jane/bin/ansible-jane "$PKG_ROOT/usr/bin/ansible-jane"

          fpm -s dir -t deb \
            -n ansible-jane \
            -v "$VERSION" \
            --description "Manage Ansible Automation Platform with an AI assistant" \
            --url "https://github.com/leogallego/ansible-jane" \
            --license "Apache-2.0" \
            -C "$PKG_ROOT" \
            .

      - name: Rename artifacts
        run: |
          VERSION="${RELEASE_TAG#v}"
          mv composeApp/build/compose/jars/*.jar "ansible-jane-desktop-linux-${VERSION}.jar"
          mv ansible-jane_*.deb "ansible-jane-desktop-linux-${VERSION}.deb"

      - name: Upload DEB + JAR artifacts
        uses: actions/upload-artifact@v7
        with:
          name: desktop-linux-deb
          path: |
            ansible-jane-desktop-linux-*.jar
            ansible-jane-desktop-linux-*.deb

  desktop-linux-rpm:
    name: Build Desktop RPM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: refs/tags/${{ env.RELEASE_TAG }}

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: jetbrains
          java-version: "25"
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set execution flag for gradlew
        run: chmod +x gradlew

      - name: Build application distribution
        run: ./gradlew :composeApp:createDistributable --stacktrace

      - name: Copy java binary into runtime
        run: |
          DIST_DIR="composeApp/build/compose/binaries/main/app/ansible-jane"
          mkdir -p "$DIST_DIR/lib/runtime/bin"
          cp "$JAVA_HOME/bin/java" "$DIST_DIR/lib/runtime/bin/java"
          chmod +x "$DIST_DIR/lib/runtime/bin/java"

      - name: Replace native launcher with shell script
        run: |
          VERSION="${RELEASE_TAG#v}"
          DIST_DIR="composeApp/build/compose/binaries/main/app/ansible-jane"
          cp composeApp/packaging/launcher.sh "$DIST_DIR/bin/ansible-jane"
          sed -i "s/@VERSION@/$VERSION/" "$DIST_DIR/bin/ansible-jane"
          chmod +x "$DIST_DIR/bin/ansible-jane"

      - name: Install fpm
        run: sudo apt-get update && sudo apt-get install -y ruby-dev rpm desktop-file-utils && sudo gem install fpm

      - name: Validate desktop file
        run: desktop-file-validate composeApp/packaging/ansible-jane.desktop

      - name: Build RPM package
        run: |
          VERSION="${RELEASE_TAG#v}"
          DIST_DIR="composeApp/build/compose/binaries/main/app/ansible-jane"
          PKG_ROOT=$(mktemp -d)

          mkdir -p "$PKG_ROOT/opt/ansible-jane"
          cp -r "$DIST_DIR/." "$PKG_ROOT/opt/ansible-jane/"

          mkdir -p "$PKG_ROOT/usr/share/applications"
          cp composeApp/packaging/ansible-jane.desktop "$PKG_ROOT/usr/share/applications/"

          mkdir -p "$PKG_ROOT/usr/share/icons/hicolor/512x512/apps"
          cp composeApp/icon.png "$PKG_ROOT/usr/share/icons/hicolor/512x512/apps/ansible-jane.png"

          mkdir -p "$PKG_ROOT/usr/bin"
          ln -s /opt/ansible-jane/bin/ansible-jane "$PKG_ROOT/usr/bin/ansible-jane"

          fpm -s dir -t rpm \
            -n ansible-jane \
            -v "$VERSION" \
            --description "Manage Ansible Automation Platform with an AI assistant" \
            --url "https://github.com/leogallego/ansible-jane" \
            --license "Apache-2.0" \
            -C "$PKG_ROOT" \
            .

      - name: Rename artifact
        run: |
          VERSION="${RELEASE_TAG#v}"
          mv ansible-jane-*.rpm "ansible-jane-desktop-linux-${VERSION}.rpm"

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v7
        with:
          name: desktop-linux-rpm
          path: ansible-jane-desktop-linux-*.rpm

  desktop-linux-tar:
    name: Build Linux Tarball
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: refs/tags/${{ env.RELEASE_TAG }}

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: jetbrains
          java-version: "25"
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set execution flag for gradlew
        run: chmod +x gradlew

      - name: Build application distribution
        run: ./gradlew :composeApp:createDistributable --stacktrace

      - name: Copy java binary into runtime
        run: |
          DIST_DIR="composeApp/build/compose/binaries/main/app/ansible-jane"
          mkdir -p "$DIST_DIR/lib/runtime/bin"
          cp "$JAVA_HOME/bin/java" "$DIST_DIR/lib/runtime/bin/java"
          chmod +x "$DIST_DIR/lib/runtime/bin/java"

      - name: Replace native launcher with shell script
        run: |
          VERSION="${RELEASE_TAG#v}"
          DIST_DIR="composeApp/build/compose/binaries/main/app/ansible-jane"
          cp composeApp/packaging/launcher.sh "$DIST_DIR/bin/ansible-jane"
          sed -i "s/@VERSION@/$VERSION/" "$DIST_DIR/bin/ansible-jane"
          chmod +x "$DIST_DIR/bin/ansible-jane"

      - name: Create tarball
        run: |
          VERSION="${RELEASE_TAG#v}"
          cd composeApp/build/compose/binaries/main/app
          tar czf "$GITHUB_WORKSPACE/ansible-jane-desktop-linux-${VERSION}.tar.gz" ansible-jane

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v7
        with:
          name: desktop-linux-tar
          path: ansible-jane-desktop-linux-*.tar.gz

  desktop-linux-appimage:
    name: Build AppImage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: refs/tags/${{ env.RELEASE_TAG }}

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: jetbrains
          java-version: "25"
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set execution flag for gradlew
        run: chmod +x gradlew

      - name: Install AppImage tools
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 file
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

      - name: Build application distribution
        run: ./gradlew :composeApp:createDistributable --stacktrace

      - name: Copy java binary into runtime
        run: |
          DIST_DIR="composeApp/build/compose/binaries/main/app/ansible-jane"
          mkdir -p "$DIST_DIR/lib/runtime/bin"
          cp "$JAVA_HOME/bin/java" "$DIST_DIR/lib/runtime/bin/java"
          chmod +x "$DIST_DIR/lib/runtime/bin/java"

      - name: Replace native launcher with shell script
        run: |
          VERSION="${RELEASE_TAG#v}"
          DIST_DIR="composeApp/build/compose/binaries/main/app/ansible-jane"
          cp composeApp/packaging/launcher.sh "$DIST_DIR/bin/ansible-jane"
          sed -i "s/@VERSION@/$VERSION/" "$DIST_DIR/bin/ansible-jane"
          chmod +x "$DIST_DIR/bin/ansible-jane"

      - name: Create AppDir structure
        run: |
          APP_NAME="ansible-jane"
          mkdir -p AppDir/usr/lib
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/512x512/apps

          cp -r "composeApp/build/compose/binaries/main/app/${APP_NAME}/." AppDir/usr/lib/
          cp composeApp/icon.png AppDir/usr/share/icons/hicolor/512x512/apps/ansible-jane.png
          cp composeApp/icon.png AppDir/ansible-jane.png

          cat > AppDir/ansible-jane.desktop << 'DESKTOP'
          [Desktop Entry]
          Name=Ansible Jane
          Comment=Manage Ansible Automation Platform with an AI assistant
          Exec=ansible-jane
          Icon=ansible-jane
          Type=Application
          Categories=Utility;Network;
          Keywords=Ansible;AAP;Automation;AI;
          StartupWMClass=compose-window
          Terminal=false
          DESKTOP
          cp AppDir/ansible-jane.desktop AppDir/usr/share/applications/

          cat > AppDir/AppRun << 'APPRUN'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          exec "${HERE}/usr/lib/bin/ansible-jane" "$@"
          APPRUN
          chmod +x AppDir/AppRun

      - name: Build AppImage
        run: |
          VERSION="${RELEASE_TAG#v}"
          ARCH=x86_64 ./appimagetool-x86_64.AppImage --appimage-extract-and-run AppDir "ansible-jane-desktop-linux-${VERSION}.AppImage"

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v7
        with:
          name: desktop-linux-appimage
          path: ansible-jane-desktop-linux-*.AppImage

  desktop-linux-flatpak:
    name: Build Flatpak
    if: ${{ inputs.build_all || !contains(inputs.tag || github.ref_name, '-') }}
    needs: [desktop-linux-tar]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: refs/tags/${{ env.RELEASE_TAG }}

      - name: Download Linux tarball
        uses: actions/download-artifact@v8
        with:
          name: desktop-linux-tar

      - name: Install Flatpak and Builder
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub org.freedesktop.Platform//24.08 org.freedesktop.Sdk//24.08

      - name: Build Flatpak
        run: |
          VERSION="${RELEASE_TAG#v}"
          TARBALL="ansible-jane-desktop-linux-${VERSION}.tar.gz"

          cp "${TARBALL}" flatpak/
          SHA256=$(sha256sum "${TARBALL}" | cut -d' ' -f1)

          cd flatpak
          sed -i "s|url: .*tar\.gz|path: ${TARBALL}|" io.github.leogallego.ansiblejane.yaml
          sed -i "s|sha256: .*|sha256: ${SHA256}|" io.github.leogallego.ansiblejane.yaml

          flatpak-builder --repo=repo --force-clean build-dir io.github.leogallego.ansiblejane.yaml
          flatpak build-bundle repo "../ansible-jane-desktop-linux-${VERSION}.flatpak" io.github.leogallego.ansiblejane

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v7
        with:
          name: desktop-linux-flatpak
          path: ansible-jane-desktop-linux-*.flatpak

  desktop-macos:
    name: Build Desktop macOS package
    if: ${{ inputs.build_all || !contains(inputs.tag || github.ref_name, '-') }}
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: refs/tags/${{ env.RELEASE_TAG }}

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: jetbrains
          java-version: "25"
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set execution flag for gradlew
        run: chmod +x gradlew

      - name: Build DMG package
        run: ./gradlew :composeApp:packageDmg --stacktrace

      - name: Print jpackage logs on failure
        if: failure()
        run: |
          for log in composeApp/build/compose/logs/**/*.txt; do
            echo "=== $log ==="
            cat "$log"
          done

      - name: Rename artifact
        run: |
          VERSION="${RELEASE_TAG#v}"
          mv composeApp/build/compose/binaries/main/dmg/*.dmg "ansible-jane-desktop-macos-${VERSION}.dmg"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v7
        with:
          name: desktop-macos
          path: ansible-jane-desktop-macos-*.dmg

  desktop-windows:
    name: Build Desktop Windows package
    if: ${{ inputs.build_all || !contains(inputs.tag || github.ref_name, '-') }}
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: refs/tags/${{ env.RELEASE_TAG }}

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: jetbrains
          java-version: "25"
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build MSI package
        run: ./gradlew :composeApp:packageMsi --stacktrace

      - name: Rename artifact
        shell: bash
        run: |
          VERSION="${RELEASE_TAG#v}"
          mv composeApp/build/compose/binaries/main/msi/*.msi "ansible-jane-desktop-windows-${VERSION}.msi"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: desktop-windows
          path: ansible-jane-desktop-windows-*.msi

  release:
    name: Create GitHub Release
    if: always() && !cancelled()
    needs: [apk, desktop-linux-deb, desktop-linux-rpm, desktop-macos, desktop-windows, desktop-linux-tar, desktop-linux-appimage, desktop-linux-flatpak]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: refs/tags/${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Download required artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true
          pattern: "{apk,desktop-linux-deb,desktop-linux-rpm,desktop-macos,desktop-windows,desktop-linux-flatpak}"

      - name: Download optional artifacts
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true
          pattern: "{desktop-linux-tar,desktop-linux-appimage}"

      - name: Extract changelog
        run: |
          PREVIOUS_TAG=$(git tag --sort=-creatordate | grep -v "^${RELEASE_TAG}$" | head -n1)
          if [ -z "$PREVIOUS_TAG" ]; then
            git log --pretty=format:"- %s" "${RELEASE_TAG}" > changelog.txt
          else
            git log --pretty=format:"- %s" "${PREVIOUS_TAG}..${RELEASE_TAG}" --no-merges > changelog.txt
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Release ${{ env.RELEASE_TAG }}
          body_path: changelog.txt
          files: |
            ansible-jane-*.apk
            ansible-jane-desktop-linux-*.jar
            ansible-jane-desktop-linux-*.deb
            ansible-jane-desktop-linux-*.rpm
            ansible-jane-desktop-linux-*.tar.gz
            ansible-jane-desktop-linux-*.AppImage
            ansible-jane-desktop-linux-*.flatpak
            ansible-jane-desktop-macos-*.dmg
            ansible-jane-desktop-windows-*.msi
          prerelease: ${{ contains(env.RELEASE_TAG, '-') }}
