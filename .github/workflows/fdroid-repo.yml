name: Update F-Droid repo

on:
  workflow_run:
    workflows: ["Build and Release"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-repo:
    name: Build and deploy F-Droid repo
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install fdroidserver
        run: |
          sudo apt-get update
          sudo apt-get install -y apksigner
          pip install git+https://gitlab.com/fdroid/fdroidserver.git@2.4.5

      - name: Set up repo secrets
        run: |
          mkdir -p fdroid/repo
          echo "$FDROID_KEYSTORE_B64" | base64 -d > fdroid/keystore.p12
          cat > fdroid/config.yml <<'CONF'
          repo_url: https://jane.ansible.ar/fdroid/repo
          repo_name: Ansible Jane F-Droid Repo
          repo_description: Self-hosted F-Droid repository for Ansible Jane, a remote control app for Ansible Automation Platform.
          repo_icon: icon.png
          keystore: keystore.p12
          CONF
          echo "keystorepass: $FDROID_KEYSTORE_PASS" >> fdroid/config.yml
          echo "keypass: $FDROID_KEY_PASS" >> fdroid/config.yml
          echo "repo_keyalias: $FDROID_KEY_ALIAS" >> fdroid/config.yml
          echo "keydname: CN=jane.ansible.ar, OU=F-Droid Repo, O=Ansible Jane" >> fdroid/config.yml
          sed -i 's/^          //' fdroid/config.yml
          chmod 0600 fdroid/config.yml
        env:
          FDROID_KEYSTORE_B64: ${{ secrets.FDROID_KEYSTORE }}
          FDROID_KEYSTORE_PASS: ${{ secrets.FDROID_KEYSTORE_PASS }}
          FDROID_KEY_PASS: ${{ secrets.FDROID_KEY_PASS }}
          FDROID_KEY_ALIAS: ${{ secrets.FDROID_KEY_ALIAS }}

      - name: Download all release APKs
        run: |
          for tag in $(gh release list --json tagName -q '.[].tagName'); do
            gh release download "$tag" --pattern '*.apk' --dir fdroid/repo --skip-existing 2>/dev/null || true
          done
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Copy repo icon
        run: |
          mkdir -p fdroid/repo/icons
          cp fastlane/metadata/android/en-US/images/icon.png fdroid/repo/icons/icon.png

      - name: Create app metadata
        run: |
          mkdir -p fdroid/metadata
          cat > fdroid/metadata/io.github.leogallego.ansiblejane.yml <<'META'
          Categories:
            - System
          License: GPL-3.0-only
          AuthorName: Leonardo Gallego
          WebSite: https://jane.ansible.ar
          SourceCode: https://github.com/leogallego/ansible-jane
          IssueTracker: https://github.com/leogallego/ansible-jane/issues
          Changelog: https://github.com/leogallego/ansible-jane/releases
          Summary: AI-powered remote control for Ansible Automation Platform
          Description: |-
            Ansible Jane is a lightweight Android app for managing your Ansible
            Automation Platform (AAP) instances on the go.

            Jane is an AI assistant that works with the models you choose: local
            models as small as qwen2.5:7b running on Ollama, or frontier providers
            like OpenAI-compatible APIs, Google Gemini, and OpenRouter. Jane uses
            tool-use and MCP to query your AAP instance in natural language.

            Features:
            * Browse and launch job templates and workflow templates
            * Monitor job status and workflow execution in real-time
            * Manage inventories and hosts
            * View schedules and EDA audit logs
            * AI assistant (Jane) for natural-language interaction with your AAP instance
            * Bring your own model: local (Ollama, llama.cpp) or cloud (OpenAI-compatible, Gemini, OpenRouter)
            * Multi-instance support with secure token storage
            * Material You (Material 3) design with dark mode support

            Requirements:
            * Ansible Automation Platform 2.5+ with Gateway
            * Android 12 (API 31) or higher

            Ansible Jane is free and open source software.
          META
          sed -i 's/^          //' fdroid/metadata/io.github.leogallego.ansiblejane.yml

      - name: Generate repo index
        working-directory: fdroid
        run: fdroid update --create-metadata

      - name: Prepare Pages artifact
        run: |
          cp -r site/ _site/
          mkdir -p _site/fdroid
          cp -r fdroid/repo _site/fdroid/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
