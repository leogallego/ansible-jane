name: Update F-Droid repo

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-repo:
    name: Build and deploy F-Droid repo
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install fdroidserver
        run: |
          sudo apt-get update
          sudo apt-get install -y apksigner
          pip install git+https://gitlab.com/fdroid/fdroidserver.git

      - name: Set up repo secrets
        run: |
          mkdir -p fdroid/repo
          echo "$FDROID_KEYSTORE_B64" | base64 -d > fdroid/keystore.p12
          echo "$FDROID_CONFIG_B64" | base64 -d > fdroid/config.yml
          chmod 0600 fdroid/config.yml
        env:
          FDROID_KEYSTORE_B64: ${{ secrets.FDROID_KEYSTORE }}
          FDROID_CONFIG_B64: ${{ secrets.FDROID_CONFIG_YML }}

      - name: Download all release APKs
        run: |
          for tag in $(gh release list --json tagName -q '.[].tagName'); do
            gh release download "$tag" --pattern '*.apk' --dir fdroid/repo --skip-existing 2>/dev/null || true
          done
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Generate repo index
        working-directory: fdroid
        run: fdroid update --create-metadata

      - name: Prepare Pages artifact
        run: |
          mkdir -p _site/fdroid
          cp -r fdroid/repo _site/fdroid/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
